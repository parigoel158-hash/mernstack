<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- <table>
        <thead>
            <tr>
                <th> Name </th>
                <th> Hindi</th>
                <th> English </th>
                <th> Maths </th>
                <th> Science </th>
                <th> Computer </th>
                <th> Total </th>
                <th> Average </th>
                <th> Status </th>
            </tr>
        </thead>
    </table> -->
    <script>
        let name, h, e, m, s, c, total, avg, sstatus;
        name = prompt("Enter the name");
        h = parseInt(prompt("enter hindi marks"));
        e = parseInt(prompt("enter english marks"));
        m = parseInt(prompt("enter maths marks"));
        s = parseInt(prompt("enter science marks"));
        c = parseInt(prompt("enter computer marks"));
        total = h + e + m + s + c;
        avg = total / 5;
        sstatus = (avg >= 60) ? "Pass" : "Fail";

        document.write(`<table border="1" width="100%">
        <thead>
            <tr>
                <th> Name </th>
                <th> Hindi</th>
                <th> English </th>
                <th> Maths </th>
                <th> Science </th>
                <th> Computer </th>
                <th> Total </th>
                <th> Average </th>
                <th> Status </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td> ${name} </td>
                <td> ${h}</td>
                <td>${e}</td>
                <td>${m}</td>
                <td>${s}</td>
                <td>${c}</td>
                <td>${total}</td>
                <td>${avg}</td>
                <td style="color: ${avg>=60? 'green' : 'red'}"> ${sstatus} </td>
            </tr>
        </tbody>
                
            </table>`)
    </script>
</body>

</html>
